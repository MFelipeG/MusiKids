<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Quebra-Cabeça - MusiKids Fun</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #a0eaff 0%, #ffbad2 100%);
    font-family: 'Baloo 2', cursive, Arial, sans-serif;
    color: #333;
    min-height: 100vh;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    overflow-x: hidden;
  }

  /* ── BARRA SUPERIOR FIXA ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 3px solid #FF77A9;
    box-shadow: 0 3px 14px rgba(255,119,169,0.18);
    gap: 10px;
  }

  /* Botão ← Menu */
  #voltar-menu-btn {
    padding: 8px 16px;
    font-size: 1rem;
    border-radius: 9px;
    border: none;
    background: linear-gradient(135deg, #ff007f, #21a7ff 110%);
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-weight: bold;
    box-shadow: 1px 3px 10px #21a7ff88;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Player de música — agora na barra superior */
  #musikids-player-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff0f7;
    border: 3px solid #FF77A9;
    border-radius: 50px;
    padding: 5px 14px;
    flex-shrink: 0;
  }
  .player-controls { display: flex; gap: 6px; align-items: center; }
  .player-btn {
    background: #FF77A9; border: none; color: white;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    transition: transform 0.2s;
  }
  .player-btn:active { transform: scale(0.88); }
  .player-label { font-weight: 800; color: #FF4C8B; font-size: 0.85rem; }
  .btn-shuffle.active { background: #21a7ff !important; }

  /* Espaço para não ficar atrás da barra fixa */
  #page-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 70px; /* altura da top-bar */
    padding-bottom: 24px;
  }

  header {
    font-weight: 900; font-size: 2.1rem;
    margin: 18px 0 1.2rem 0;
    color: #ff4c8b; text-shadow: 0 2px 8px #ffe1ee;
  }

  #config {
    width: 320px; background: #fff1f9; border-radius: 18px;
    padding: 1.3rem 1.6rem; box-shadow: 0 6px 30px #ffcce1a0; margin-bottom: 2rem;
  }

  label { font-weight: 700; display: block; margin-bottom: 0.5rem; color: #d23065; }

  select {
    width: 100%; padding: 0.5rem; font-size: 1rem; border-radius: 12px;
    border: 2px solid #ff2d7f; margin-bottom: 12px; font-family: 'Baloo 2';
    background: white; cursor: pointer;
  }

  #start-btn {
    width: 100%; padding: 1rem; font-weight: 700; border-radius: 20px; border: none;
    background-color: #ff4c8b; color: white; font-size: 1.25rem; cursor: pointer;
    box-shadow: 0 10px 20px #ffadc3b0; transition: transform 0.2s;
    font-family: 'Baloo 2', cursive;
  }
  #start-btn:active { transform: scale(0.95); }

  #puzzle-container {
    display: none;
    width: 90vw; max-width: 500px;
    background: #fff0f7;
    border-radius: 20px; padding: 1rem;
    box-shadow: 0 8px 38px #ffa4c5cc;
    margin-bottom: 2rem;
  }

  #instructions {
    font-weight: 700; margin-bottom: 12px; color: #d23065;
    min-height: 1.8em; font-size: 0.95rem; line-height: 1.4;
  }

  #puzzle {
    display: grid; gap: 4px;
    background: #ffbad2cc; border-radius: 16px;
    overflow: hidden; width: 100%;
    touch-action: none;
  }

  .piece {
    border-radius: 8px;
    background-repeat: no-repeat;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  .piece.selected {
    transform: scale(0.88);
    box-shadow: 0 0 0 4px #ff4c8b, 0 0 22px #ff4c8baa;
    position: relative;
    z-index: 5;
  }

  @media (max-width: 480px) {
    #config { width: 90vw; }
    header { font-size: 1.7rem; }
    /* Player compacto: esconde label "Música" em telas muito pequenas */
    .player-label { display: none; }
    #musikids-player-card { padding: 5px 8px; }
  }
</style>
</head>
<body>

<!-- ── BARRA SUPERIOR ÚNICA ── -->
<div id="top-bar">
  <a href="../index.html" id="voltar-menu-btn">← Menu</a>

  <div id="musikids-player-card">
    <span class="player-label">🎵</span>
    <div class="player-controls">
      <button class="player-btn" onclick="playPrev()">⏮️</button>
      <button class="player-btn" onclick="toggleMusic()" id="play-pause-btn">▶️</button>
      <button class="player-btn" onclick="playNext()">⏭️</button>
      <button class="player-btn btn-shuffle" onclick="toggleShuffle()" id="shuffle-btn">🔀</button>
    </div>
  </div>
</div>

<div style="position:absolute;left:-9999px;"><div id="yt-audio-element"></div></div>

<!-- ── CONTEÚDO DA PÁGINA ── -->
<div id="page-content">
  <header>Quebra-Cabeça</header>

  <div id="config">
    <label for="pieces-select">Nível (peças):</label>
    <select id="pieces-select">
      <option value="4" selected>Muito Fácil (2x2)</option>
      <option value="6">Fácil (3x2)</option>
      <option value="9">Médio (3x3)</option>
      <option value="15">Difícil (5x3)</option>
    </select>

    <label for="image-select">Selecione a imagem:</label>
    <select id="image-select">
      <option value="https://i.imgur.com/koHNUpP.jpeg">Logo MusiKids 🎵</option>
      <option value="https://i.imgur.com/Bsjz43J.jpeg">Meu Amorzinho ❤️</option>
      <option value="https://i.imgur.com/l9ovoXM.jpeg">Animais 🦁🐯🦒</option>
      <option value="https://i.imgur.com/jIqPKoT.jpeg">Passarinho 🐦</option>
      <option value="https://i.imgur.com/KT8ikZ4.jpeg">Gatinho 🐱</option>
      <option value="https://i.imgur.com/QECa0xX.jpeg">Girafa 🦒</option>
      <option value="https://i.imgur.com/7L4usk5.png">Mãe e Filha 👩‍👧</option>
      <option value="https://i.imgur.com/Hu94nWs.jpeg">Menina e Formiga 👧🐜</option>
      <option value="https://i.imgur.com/bBbs67d.jpeg">O Sapinho 🐸</option>
      <option value="https://i.imgur.com/VPzQDtb.jpeg">Ursinho Feliz 🧸</option>
      <option value="https://i.imgur.com/yZXzPEA.jpeg">Robô Amiguinho 🤖</option>
      <option value="https://i.imgur.com/HdDBc9e.jpeg">Dinossauro 🦖</option>
      <option value="https://i.imgur.com/CHKJoh4.jpeg">Trenzinho Azul 🚂</option>
      <option value="https://i.imgur.com/uumcHtI.jpeg">Trenzinho Colorido 🚆</option>
      <option value="https://i.imgur.com/MuDcinl.jpeg">Astronauta MusiKids 🚀</option>
      <option value="https://i.imgur.com/GeQBMAh.jpeg">Balão Mágico 🎈</option>
      <option value="https://i.imgur.com/CTsNa9E.jpeg">Coelhinho da Páscoa 🐰</option>
      <option value="https://i.imgur.com/PfHgOMe.jpeg">Ursinho Carinhoso 🧸💖</option>
      <option value="https://i.imgur.com/ksaXISB.jpeg">Ursinho Brincalhão 🧸🎉</option>
      <option value="https://i.imgur.com/ASmGG1a.jpeg">Ursinho Dorminhoco 🧸🌙</option>
    </select>
    <button id="start-btn">Iniciar Quebra-Cabeça</button>
  </div>

  <div id="puzzle-container">
    <div id="instructions"></div>
    <div id="puzzle"></div>
  </div>
</div>

<script src="../../js/musicas_data.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── PLAYER ────────────────────────────────────────────────
let player;
let currentIndex = parseInt(sessionStorage.getItem('musi_index')) || 0;
let isShuffle    = sessionStorage.getItem('musi_shuffle') === 'true';

function onYouTubeIframeAPIReady() {
  if (typeof listaMusicasIds === 'undefined' || !listaMusicasIds.length) return;
  player = new YT.Player('yt-audio-element', {
    height: '0', width: '0',
    videoId: listaMusicasIds[currentIndex],
    playerVars: { autoplay: sessionStorage.getItem('musi_playing') === 'true' ? 1 : 0 },
    events: {
      onReady(e) {
        const t = parseFloat(sessionStorage.getItem('musi_time')) || 0;
        if (t > 0) e.target.seekTo(t, true);
        if (isShuffle) document.getElementById('shuffle-btn').classList.add('active');
        updatePlayBtn();
      },
      onStateChange(e) {
        if (e.data === 0) playNext();
        updatePlayBtn();
      }
    }
  });
}

function updatePlayBtn() {
  const btn = document.getElementById('play-pause-btn');
  if (!btn || !player?.getPlayerState) return;
  const playing = player.getPlayerState() === 1;
  btn.innerText = playing ? '⏸️' : '▶️';
  sessionStorage.setItem('musi_playing', playing);
}
function toggleMusic() {
  if (!player) return;
  player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
  setTimeout(updatePlayBtn, 200);
}
function playNext() {
  if (!player || typeof listaMusicasIds === 'undefined') return;
  currentIndex = isShuffle
    ? Math.floor(Math.random() * listaMusicasIds.length)
    : (currentIndex + 1) % listaMusicasIds.length;
  player.loadVideoById(listaMusicasIds[currentIndex]);
  sessionStorage.setItem('musi_index', currentIndex);
}
function playPrev() {
  if (!player || typeof listaMusicasIds === 'undefined') return;
  currentIndex = (currentIndex - 1 + listaMusicasIds.length) % listaMusicasIds.length;
  player.loadVideoById(listaMusicasIds[currentIndex]);
  sessionStorage.setItem('musi_index', currentIndex);
}
function toggleShuffle() {
  isShuffle = !isShuffle;
  sessionStorage.setItem('musi_shuffle', isShuffle);
  document.getElementById('shuffle-btn').classList.toggle('active');
}
setInterval(() => {
  if (player?.getCurrentTime) sessionStorage.setItem('musi_time', player.getCurrentTime());
}, 1000);

// ── QUEBRA-CABEÇA ─────────────────────────────────────────
const puzzleEl        = document.getElementById('puzzle');
const instructions    = document.getElementById('instructions');
const puzzleContainer = document.getElementById('puzzle-container');

let rows, cols, totalPieces, imageUrl;
let selectedPiece = null;

const MSG_DEFAULT  = '👆 Toque numa peça para a selecionar.';
const MSG_SELECTED = '✅ Agora toque na peça onde quer colocá-la!';
const MSG_WIN      = '🌟 <strong>Parabéns! Conseguiste!</strong> 🌟';

document.getElementById('start-btn').onclick = () => {
  totalPieces = Number(document.getElementById('pieces-select').value);
  if      (totalPieces === 4)  { rows = 2; cols = 2; }
  else if (totalPieces === 6)  { rows = 2; cols = 3; }
  else if (totalPieces === 9)  { rows = 3; cols = 3; }
  else                         { rows = 3; cols = 5; }

  imageUrl = document.getElementById('image-select').value;
  puzzleContainer.style.display = 'block';
  instructions.innerHTML = MSG_DEFAULT;
  createPuzzle();
  window.scrollTo({ top: puzzleContainer.offsetTop - 80, behavior: 'smooth' });
};

function createPuzzle() {
  puzzleEl.innerHTML = '';
  selectedPiece = null;
  puzzleEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  puzzleEl.style.aspectRatio = `${cols} / ${rows}`;

  const arr = [];
  for (let i = 0; i < totalPieces; i++) {
    const piece = document.createElement('div');
    piece.classList.add('piece');
    piece.dataset.index = i;

    const r    = Math.floor(i / cols);
    const c    = i % cols;
    const xPct = cols > 1 ? (c * 100) / (cols - 1) : 0;
    const yPct = rows > 1 ? (r * 100) / (rows - 1) : 0;

    piece.style.backgroundImage    = `url(${imageUrl})`;
    piece.style.backgroundSize     = `${cols * 100}% ${rows * 100}%`;
    piece.style.backgroundPosition = `${xPct}% ${yPct}%`;

    piece.addEventListener('pointerdown', onPiecePress);
    arr.push(piece);
  }

  do { arr.sort(() => Math.random() - 0.5); } while (isSolved(arr));
  arr.forEach(p => puzzleEl.appendChild(p));
}

function onPiecePress(e) {
  e.preventDefault();
  const piece = this;

  if (!selectedPiece) {
    selectedPiece = piece;
    piece.classList.add('selected');
    instructions.innerHTML = MSG_SELECTED;
  } else if (selectedPiece === piece) {
    deselect();
  } else {
    swapPieces(selectedPiece, piece);
    deselect();
  }
}

function deselect() {
  if (selectedPiece) {
    selectedPiece.classList.remove('selected');
    selectedPiece = null;
  }
  if (!isSolved(Array.from(puzzleEl.children))) {
    instructions.innerHTML = MSG_DEFAULT;
  }
}

function swapPieces(a, b) {
  const ph = document.createElement('div');
  puzzleEl.insertBefore(ph, b);
  puzzleEl.insertBefore(b, a);
  puzzleEl.insertBefore(a, ph);
  ph.remove();
  checkWin();
}

function isSolved(arr) {
  return arr.every((p, i) => Number(p.dataset.index) === i);
}

function checkWin() {
  if (isSolved(Array.from(puzzleEl.children))) {
    instructions.innerHTML = MSG_WIN;
  }
}
</script>
</body>
</html>
