<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Musikids Fun - Jogo de Ligar Imagens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0; padding: 0;
    font-family: 'Baloo 2', cursive, Arial, sans-serif;
    background: linear-gradient(135deg, #f7f7ff, #ffd3e4);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    user-select: none;
  }

  /* ── BARRA SUPERIOR FIXA ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 3px solid #FF77A9;
    box-shadow: 0 3px 14px rgba(255,119,169,0.18);
    gap: 10px;
  }

  #btn-menu {
    padding: 8px 16px; font-size: 1rem; border-radius: 9px; border: none;
    background: #a1d578; color: #214d0d;
    font-family: 'Baloo 2', cursive; font-weight: 900;
    box-shadow: 0 3px 10px #a1d578aa; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }

  #musikids-player-card {
    display: flex; align-items: center; gap: 8px;
    background: #fff0f7; border: 3px solid #FF77A9;
    border-radius: 50px; padding: 5px 14px; flex-shrink: 0;
  }
  .player-controls { display: flex; gap: 6px; align-items: center; }
  .player-btn {
    background: #FF77A9; border: none; color: white;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    transition: transform 0.2s;
  }
  .player-btn:active { transform: scale(0.88); }
  .player-label { font-weight: 800; color: #FF4C8B; font-size: 0.85rem; }
  .btn-shuffle.active { background: #21a7ff !important; }

  /* ── CONTEÚDO ── */
  #page-content {
    width: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 68px;
    padding-bottom: 30px;
  }

  header {
    margin: 16px 0 14px 0;
    font-weight: 900; font-size: 1.35rem;
    color: #d63a6d; letter-spacing: 1px;
    text-align: center;
  }

  #game-container {
    max-width: 900px; width: 95%;
    background: white; border-radius: 30px;
    padding: 20px 30px 30px 30px;
    box-shadow: 0 8px 30px #f3bbcfaa;
    display: flex; justify-content: space-between;
    position: relative; overflow: visible;
  }

  #left-col, #right-col {
    display: flex; flex-direction: column;
    gap: 25px; width: 40%; align-items: center;
    /* z-index alto para ficar na frente do SVG */
    position: relative; z-index: 2;
  }

  .img-item {
    width: 130px; height: 130px; font-size: 70px;
    border-radius: 18px; background: #ffe4f3;
    box-shadow: 0 2px 8px rgba(214,58,109,0.35);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    /* Garante que as peças fiquem sempre na frente */
    z-index: 2;
  }
  .img-item.selected {
    box-shadow: 0 0 18px 5px #f99bbf;
    transform: scale(1.1);
  }
  .img-item.matched {
    opacity: 0.75;
    cursor: default;
  }
  .img-item img { max-width: 115px; max-height: 115px; pointer-events: none; }

  #message {
    position: absolute; bottom: -60px; left: 50%;
    transform: translateX(-50%);
    font-weight: 800; font-size: 1.35rem; color: #d63a6d;
    white-space: nowrap;
  }

  /* SVG ATRÁS das colunas */
  #canvas-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    /* z-index 1 = atrás das colunas (z-index 2) */
    z-index: 1;
    overflow: visible;
  }

  .confetti-piece {
    position: fixed; width: 8px; height: 8px; border-radius: 50%;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  @media (max-width: 720px) {
    #game-container {
      flex-direction: column; align-items: center; gap: 30px;
    }
    #left-col, #right-col {
      width: 100%; flex-direction: row;
      justify-content: center; gap: 16px; flex-wrap: wrap;
    }
    .img-item { width: 100px; height: 100px; font-size: 50px; }
    #message { position: static; margin-top: 10px; transform: none; white-space: normal; text-align: center; }
    header { font-size: 1.05rem; }

    /* No mobile o SVG precisa cobrir todo o game-container incluindo as colunas empilhadas */
    #canvas-lines { width: 100%; height: 100%; }

    .player-label { display: none; }
    #musikids-player-card { padding: 5px 8px; }
  }
</style>
</head>
<body>

<!-- ── BARRA SUPERIOR ── -->
<div id="top-bar">
  <button id="btn-menu" onclick="location.href='../index.html'">← Menu de Jogos</button>

  <div id="musikids-player-card">
    <span class="player-label">🎵</span>
    <div class="player-controls">
      <button class="player-btn" onclick="playPrev()">⏮️</button>
      <button class="player-btn" onclick="toggleMusic()" id="play-pause-btn">▶️</button>
      <button class="player-btn" onclick="playNext()">⏭️</button>
      <button class="player-btn btn-shuffle" onclick="toggleShuffle()" id="shuffle-btn">🔀</button>
    </div>
  </div>
</div>

<div style="position:absolute;left:-9999px;"><div id="yt-audio-element"></div></div>

<!-- ── CONTEÚDO ── -->
<div id="page-content">
  <header>Musikids Fun — Jogo de Ligar Imagens</header>

  <div id="game-container">
    <div id="left-col"></div>
    <!-- SVG PRIMEIRO no DOM = atrás dos elementos seguintes -->
    <svg id="canvas-lines"></svg>
    <div id="right-col"></div>
    <div id="message" aria-live="assertive" role="alert"></div>
  </div>
</div>

<div id="confetti-container"></div>

<script src="../../js/musicas_data.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── PLAYER ────────────────────────────────────────────────
let player;
let currentIndex = parseInt(sessionStorage.getItem('musi_index')) || 0;
let isShuffle    = sessionStorage.getItem('musi_shuffle') === 'true';
const getPlaylist = () => typeof listaMusicasIds !== 'undefined' ? listaMusicasIds : ['dQw4w9WgXcQ'];

function onYouTubeIframeAPIReady() {
  const savedTime = parseFloat(sessionStorage.getItem('musi_time')) || 0;
  const wasPlaying = sessionStorage.getItem('musi_playing') === 'true';
  player = new YT.Player('yt-audio-element', {
    height: '0', width: '0',
    videoId: getPlaylist()[currentIndex],
    playerVars: { autoplay: wasPlaying ? 1 : 0 },
    events: {
      onReady(e) {
        if (savedTime > 0) e.target.seekTo(savedTime, true);
        if (isShuffle) document.getElementById('shuffle-btn').classList.add('active');
        updatePlayBtn();
      },
      onStateChange(e) {
        if (e.data === 0) playNext();
        updatePlayBtn();
        sessionStorage.setItem('musi_playing', e.data === 1);
      }
    }
  });
  setInterval(() => {
    if (player?.getCurrentTime) {
      sessionStorage.setItem('musi_time', player.getCurrentTime());
      sessionStorage.setItem('musi_index', currentIndex);
    }
  }, 1000);
}

function updatePlayBtn() {
  const btn = document.getElementById('play-pause-btn');
  if (btn && player?.getPlayerState) btn.innerText = player.getPlayerState() === 1 ? '⏸️' : '▶️';
}
function toggleMusic() {
  if (!player?.playVideo) return;
  player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
  setTimeout(updatePlayBtn, 200);
}
function playNext() {
  const list = getPlaylist();
  currentIndex = isShuffle ? Math.floor(Math.random() * list.length) : (currentIndex + 1) % list.length;
  player?.loadVideoById(list[currentIndex]);
  sessionStorage.setItem('musi_time', 0);
  updatePlayBtn();
}
function playPrev() {
  const list = getPlaylist();
  currentIndex = (currentIndex - 1 + list.length) % list.length;
  player?.loadVideoById(list[currentIndex]);
  sessionStorage.setItem('musi_time', 0);
  updatePlayBtn();
}
function toggleShuffle() {
  isShuffle = !isShuffle;
  sessionStorage.setItem('musi_shuffle', isShuffle);
  document.getElementById('shuffle-btn').classList.toggle('active');
}
</script>

<script>
// ── JOGO ──────────────────────────────────────────────────
const allPairs = [
  {left:"dog",        leftImg:"🐶",  right:"doghouse",  rightImg:"🏠"},
  {left:"mouse",      leftImg:"🐭",  right:"cheese",    rightImg:"🧀"},
  {left:"cat",        leftImg:"🐱",  right:"yarn",      rightImg:"🧶"},
  {left:"bird",       leftImg:"🐦",  right:"nest",      rightImg:"🪹"},
  {left:"fish",       leftImg:"🐟",  right:"water",     rightImg:"💧"},
  {left:"turtle",     leftImg:"🐢",  right:"pond",      rightImg:"🏞️"},
  {left:"frog",       leftImg:"🐸",  right:"lily",      rightImg:"🌸"},
  {left:"cow",        leftImg:"🐄",  right:"milk",      rightImg:"🥛"},
  {left:"horse",      leftImg:"🐴",  right:"stable",    rightImg:"🏇"},
  {left:"bee",        leftImg:"🐝",  right:"hive",      rightImg:"🍯"},
  {left:"pig",        leftImg:"🐷",  right:"mud",       rightImg:"🟤"},
  {left:"rabbit",     leftImg:"🐰",  right:"carrot",    rightImg:"🥕"},
  {left:"owl",        leftImg:"🦉",  right:"tree",      rightImg:"🌳"},
  {left:"duck",       leftImg:"🦆",  right:"pond2",     rightImg:"🌊"},
  {left:"lion",       leftImg:"🦁",  right:"jungle",    rightImg:"🌴"},
  {left:"elephant",   leftImg:"🐘",  right:"waterhole", rightImg:"🏜️"},
  {left:"bear",       leftImg:"🐻",  right:"forest",    rightImg:"🌲"},
  {left:"snake",      leftImg:"🐍",  right:"rock",      rightImg:"🪨"},
  {left:"monkey",     leftImg:"🐒",  right:"banana",    rightImg:"🍌"},
  {left:"crown",      leftImg:"👑",  right:"king",      rightImg:"🤴"},
  {left:"cat-face",   leftImg:"😺",  right:"box",       rightImg:"📦"},
  {left:"sheep",      leftImg:"🐑",  right:"wool",      rightImg:"🧶"},
  {left:"baby-chick", leftImg:"🐤",  right:"egg",       rightImg:"🥚"},
  {left:"fire",       leftImg:"🔥",  right:"firefighter",rightImg:"🚒"},
  {left:"book",       leftImg:"📖",  right:"library",   rightImg:"🏛️"},
  {left:"rocket",     leftImg:"🚀",  right:"space",     rightImg:"🌌"},
  {left:"flower",     leftImg:"🌷",  right:"garden",    rightImg:"🌻"},
  {left:"bull",       leftImg:"🐂",  right:"barn",      rightImg:"🏚️"},
  {left:"fox",        leftImg:"🦊",  right:"den",       rightImg:"🏡"},
  {left:"snowman",    leftImg:"☃️",  right:"snow",      rightImg:"❄️"},
  {left:"sun",        leftImg:"☀️",  right:"beach",     rightImg:"🏖️"},
  {left:"cloud",      leftImg:"☁️",  right:"rain",      rightImg:"🌧️"},
];

const leftCol  = document.getElementById('left-col');
const rightCol = document.getElementById('right-col');
const canvas   = document.getElementById('canvas-lines');
const message  = document.getElementById('message');
const confettiContainer = document.getElementById('confetti-container');

let usedPairs    = [];
let selectedLeft  = null;
let selectedRight = null;
let drawnLines   = [];
let matchedCount = 0;

function startGame() {
  leftCol.innerHTML  = '';
  rightCol.innerHTML = '';
  clearSVG();
  drawnLines   = [];
  matchedCount = 0;
  selectedLeft  = null;
  selectedRight = null;
  message.textContent = '';

  usedPairs = getRandomPairs(5);
  renderItems();
}

function clearSVG() {
  while (canvas.firstChild) canvas.removeChild(canvas.firstChild);
}

function getRandomPairs(n) {
  let pool = allPairs.filter(p => !usedPairs.some(u => u.left === p.left));
  if (pool.length < n) { usedPairs = []; pool = allPairs.slice(); }
  return shuffle(pool).slice(0, n);
}

function renderItems() {
  const leftOrder  = shuffle(usedPairs.slice());
  const rightOrder = shuffle(usedPairs.slice());

  leftOrder.forEach(pair => {
    const div = makeItem(pair.leftImg, pair.left, () => selectLeft(div));
    leftCol.appendChild(div);
  });
  rightOrder.forEach(pair => {
    const div = makeItem(pair.rightImg, pair.right, () => selectRight(div));
    rightCol.appendChild(div);
  });
}

function makeItem(emoji, key, clickFn) {
  const div = document.createElement('div');
  div.classList.add('img-item');
  div.textContent = emoji;
  div.dataset.key = key;
  div.tabIndex = 0;
  div.onclick = clickFn;
  return div;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function selectLeft(elem) {
  if (elem.classList.contains('matched')) return;
  if (selectedLeft) selectedLeft.classList.remove('selected');
  selectedLeft = elem;
  elem.classList.add('selected');
  checkMatch();
}

function selectRight(elem) {
  if (elem.classList.contains('matched')) return;
  if (selectedRight) selectedRight.classList.remove('selected');
  selectedRight = elem;
  elem.classList.add('selected');
  checkMatch();
}

function checkMatch() {
  if (!selectedLeft || !selectedRight) return;

  const lKey = selectedLeft.dataset.key;
  const rKey = selectedRight.dataset.key;

  if (usedPairs.some(p => p.left === lKey && p.right === rKey)) {
    // Acerto
    drawLine(selectedLeft, selectedRight);
    selectedLeft.classList.add('matched');
    selectedRight.classList.add('matched');
    selectedLeft.onclick  = null;
    selectedRight.onclick = null;
    message.textContent = '✅ Muito bem!';
    matchedCount++;
    clearSelection();

    if (matchedCount === usedPairs.length) {
      setTimeout(() => {
        launchConfetti();
        message.textContent = '🎉 Parabéns! Você ligou todos os pares!';
      }, 350);
      setTimeout(startGame, 3500);
    }
  } else {
    // Erro
    message.textContent = 'Ops! Tente novamente! 🙈';
    setTimeout(() => { clearSelection(); message.textContent = ''; }, 900);
  }
}

function clearSelection() {
  if (selectedLeft)  selectedLeft.classList.remove('selected');
  if (selectedRight) selectedRight.classList.remove('selected');
  selectedLeft  = null;
  selectedRight = null;
}

// ── Desenha linha ATRÁS das peças ────────────────────────
function drawLine(leftEl, rightEl) {
  const svgRect   = canvas.getBoundingClientRect();
  const rectLeft  = leftEl.getBoundingClientRect();
  const rectRight = rightEl.getBoundingClientRect();

  const x1 = rectLeft.left  + rectLeft.width  / 2 - svgRect.left;
  const y1 = rectLeft.top   + rectLeft.height / 2 - svgRect.top;
  const x2 = rectRight.left + rectRight.width / 2 - svgRect.left;
  const y2 = rectRight.top  + rectRight.height/ 2 - svgRect.top;

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', '#d63a6d');
  line.setAttribute('stroke-width', '6');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', '0.7');
  canvas.appendChild(line);
  drawnLines.push(line);
}

// ── Confetes ──────────────────────────────────────────────
function launchConfetti() {
  confettiContainer.innerHTML = '';
  const colors = ['#ff597f','#fcd677','#a9d97a','#79d79a','#ff7eb9','#61dafb'];
  for (let i = 0; i < 120; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.top  = Math.random() * window.innerHeight + 'px';
    c.style.left = Math.random() * window.innerWidth  + 'px';
    c.style.animationDelay = (i * 0.02) + 's';
    confettiContainer.appendChild(c);
  }
  setTimeout(() => { confettiContainer.innerHTML = ''; }, 3500);
}

startGame();
</script>
</body>
</html>
